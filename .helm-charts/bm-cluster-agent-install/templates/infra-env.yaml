apiVersion: agent-install.openshift.io/v1beta1
kind: InfraEnv
metadata:
  name: {{ .Release.Name }}
  labels:
    agentclusterinstalls.extensions.hive.openshift.io/location: {{ .Values.location }}
    networkType: static
    {{- include "bm-cluster-agent-install.labels" . | nindent 4 }}    
spec:
  agentLabels:
    'agentclusterinstalls.extensions.hive.openshift.io/location': {{ .Values.location }}
  pullSecretRef:
    name: pullsecret-{{ .Release.Name }}
  sshAuthorizedKey: {{ .Values.sshKey }}
  ignitionConfigOverride: '{"ignition":{"version":"3.2.0"},"storage":{"files":[{"path":"/etc/containers/policy.json","mode":420,"overwrite":true,"contents":{"source":"data:text/plain;charset=utf-8;base64,"}}]}}'
  nmStateConfigLabelSelector:	
      matchLabels:	
        infraenvs.agent-install.openshift.io: {{ .Release.Name }}
  cpuArchitecture: x86_64
